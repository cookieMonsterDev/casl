name: release-please

on:
  push:
    branches: [master, next]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      paths_released: ${{ steps.release-pl.outputs.paths_released }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: googleapis/release-please-action@v5
        id: release-pl
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          config-file: ${{ github.ref_name == 'next' && 'release-please-config-next.json' || 'release-please-config.json' }}
          manifest-file: ${{ github.ref_name == 'next' && '.release-please-manifest-next.json' || '.release-please-manifest.json' }}
  publish:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.paths_released && needs.release.outputs.paths_released != '[]' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-deps
      - name: Publish packages
        env:
          RELEASE_DIST_TAG: ${{ github.ref_name == 'next' && 'next' || 'latest' }}
        run: |
          for p in $(echo '${{ needs.release.outputs.paths_released }}' | jq -r '.[]'); do
            pnpm -r --filter "./$p" release
          done
