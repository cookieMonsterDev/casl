  - '@hono/node-server@1.19.13'
  - postcss@8.5.10
  - fast-uri@3.1.1
  - fast-uri@3.1.2
  - hono@4.12.18
  - hono@4.12.16
  - webpack-dev-server@5.2.4
  - ws@8.20.1
  - serialize-javascript@7.0.5
  - uuid@11.1.1
  - qs@6.15.2
  - hono@4.12.21
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - brace-expansion@5.0.6
  - shell-quote@1.8.4
